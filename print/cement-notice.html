<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>화장실 이용 안내</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #5A9E6F;
      --green-light: #e8f5e9;
      --green-dark: #3d7a4f;
      --text: #2c3e2c;
      --text-light: #5a6e5a;
      --bg: #f5f9f5;
      --white: #ffffff;
      --border: #d4e4d4;
      --radius: 10px;
    }

    body {
      font-family: 'Nunito', 'Noto Sans KR', sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Screen Controls ── */
    .screen-controls {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      border-bottom: 2px solid var(--green);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .print-btn {
      border: 2px solid var(--green);
      background: var(--green);
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      color: var(--white);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .print-btn:hover {
      background: var(--green-dark);
      border-color: var(--green-dark);
    }

    /* ── Notice Page ── */
    .notice-page {
      max-width: 700px;
      margin: 0 auto;
      padding: 48px 40px 40px;
    }

    /* Header */
    .notice-header {
      text-align: center;
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 3px solid var(--green);
    }

    .notice-header .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .notice-header h1 {
      font-size: 28px;
      font-weight: 800;
      color: var(--green);
      letter-spacing: -0.5px;
    }

    .notice-header .subtitle {
      font-size: 16px;
      color: var(--text-light);
      margin-top: 6px;
    }

    /* Body */
    .notice-body {
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      margin-bottom: 28px;
    }

    .notice-body p {
      font-size: 17px;
      line-height: 1.85;
      margin-bottom: 20px;
      color: var(--text);
      word-break: keep-all;
    }

    .notice-body p:last-child {
      margin-bottom: 0;
    }

    .highlight {
      background: linear-gradient(transparent 55%, #c8e6c9 45%);
      font-weight: 700;
      color: var(--green-dark);
      padding: 0 2px;
    }

    .emphasis {
      font-weight: 700;
      color: var(--green-dark);
    }

    /* Tip Box */
    .tip-box {
      background: var(--green-light);
      border-left: 4px solid var(--green);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 20px 24px;
      margin-bottom: 28px;
    }

    .tip-box .tip-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 8px;
    }

    .tip-box p {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      word-break: keep-all;
    }

    /* Footer */
    .notice-footer {
      text-align: center;
      padding-top: 20px;
      border-top: 2px solid var(--green-light);
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.8;
    }

    .notice-footer .host {
      font-weight: 700;
      color: var(--green);
    }

    /* ── Print ── */
    @media print {
      @page {
        size: A4;
        margin: 18mm;
      }

      body {
        background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .screen-controls {
        display: none !important;
      }

      .notice-page {
        max-width: 100%;
        padding: 0;
        margin: 0;
      }

      .notice-header h1 { font-size: 28pt; }
      .notice-header .subtitle { font-size: 14pt; }

      .notice-body { padding: 24pt 20pt; }
      .notice-body p { font-size: 17pt; line-height: 1.85; }

      .tip-box { padding: 16pt 18pt; }
      .tip-box .tip-title { font-size: 15pt; }
      .tip-box p { font-size: 15pt; }

      .notice-footer { font-size: 14pt; }
    }

    @media screen and (max-width: 640px) {
      .notice-page { padding: 24px 16px 32px; }
      .notice-header h1 { font-size: 22px; }
      .notice-body { padding: 24px 20px; }
      .notice-body p { font-size: 15px; }
    }
  </style>
</head>
<body>

  <div class="screen-controls">
    <button class="print-btn" onclick="window.print()">출력하기 (Print)</button>
  </div>

  <div class="notice-page">
    <div class="notice-header">
      <div class="icon">🏠</div>
      <h1>[안내] 화장실 이용 시 참고해 주세요!</h1>
    </div>

    <div class="notice-body">
      <p>
        더 안정적인 세탁기 사용을 위해 최근 바닥
        <span class="highlight">수평 미장 작업</span>을 완료했습니다.
      </p>
      <p>
        이로 인해 미세한 <span class="highlight">새 시멘트 냄새</span>가
        일시적으로 느껴질 수 있으나, 하수구 문제가 아닌
        <span class="emphasis">'새 단장 냄새'</span>이니
        안심하고 이용해 주세요! ^^
      </p>
      <p>
        쾌적한 이용을 위해 환기와 향기 관리에 더욱 신경 쓰겠습니다.
      </p>
    </div>

    <div class="tip-box">
      <div class="tip-title">💡 환기 팁</div>
      <p>화장실 창문을 열어두시면 냄새가 더 빨리 빠집니다.</p>
    </div>

    <div class="notice-footer">
      <p>감사합니다! 🌿</p>
      <p class="host">— 호스트 드림</p>
    </div>
  </div>

</body>
</html>
